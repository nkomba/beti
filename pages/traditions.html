<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/base.css">

  <link rel="stylesheet" href="/assets/css/responsive.css">
  <link rel="icon" href="/assets/favicon/favicon.svg" type="image/svg+xml">
</head>
<body>
  <a class="skip-link" href="#main" data-i18n="a11y.skipToContent">Aller au contenu principal</a>
  <header class="site-header" id="header"></header>

  <div class="container">
    <nav class="breadcrumb" aria-label="Fil d'Ariane" data-i18n-aria-label="a11y.breadcrumb">
      <ol>
        <li><a href="/index.html" data-i18n="nav.home">Accueil</a></li>
        <li><span aria-current="page" data-i18n="nav.traditions">Traditions</span></li>
      </ol>
    </nav>
  </div>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <h1 class="page-hero__title" data-i18n="traditions.title">Traditions &amp; arts vivants</h1>
        <p class="page-hero__intro" data-i18n="traditions.intro"></p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <!-- Accessible tabbed navigation -->
        <div class="tabs">
          <div class="tabs__list" role="tablist" aria-label="Traditions">
            <button class="tabs__tab" role="tab" id="tab-music" aria-controls="panel-music" aria-selected="true" data-i18n="traditions.tabMusic">Musique</button>
            <button class="tabs__tab" role="tab" id="tab-dance" aria-controls="panel-dance" aria-selected="false" tabindex="-1" data-i18n="traditions.tabDance">Danse</button>
            <button class="tabs__tab" role="tab" id="tab-epics" aria-controls="panel-epics" aria-selected="false" tabindex="-1" data-i18n="traditions.tabEpics">Épopées orales</button>
            <button class="tabs__tab" role="tab" id="tab-beliefs" aria-controls="panel-beliefs" aria-selected="false" tabindex="-1" data-i18n="traditions.tabBeliefs">Croyances</button>
            <button class="tabs__tab" role="tab" id="tab-rites" aria-controls="panel-rites" aria-selected="false" tabindex="-1" data-i18n="traditions.tabRites">Rites de passage</button>
          </div>

          <!-- Music -->
          <section class="tabs__panel" role="tabpanel" id="panel-music" aria-labelledby="tab-music">
            <div class="two-col">
              <div>
                <h2 data-i18n="traditions.musicTitle">Musique : du mvet au bikutsi</h2>
                <p data-i18n="traditions.musicMvett"></p>
                <p data-i18n="traditions.musicBikutsi"></p>
                <!-- VERIFY: spelling and role of the mendzaŋ xylophone orchestras. -->
                <p data-i18n="traditions.musicChoral"></p>
              </div>
              <figure>
                <img data-image-key="traditions-music"
                     src="/assets/img/music.jpg"
                     alt="" data-i18n-alt="traditions.musicAlt" loading="lazy"
                     style="border-radius:var(--radius-md)">
              </figure>
            </div>

            <h3 style="margin-top:var(--space-lg)" data-i18n="traditions.playerTitle">Écouter (extraits à venir)</h3>
<div class="audio-player" data-audio-key="mvett-01" data-title="Mvett — extrait 1"></div>
<div class="audio-player" data-audio-key="drums-01" data-title="Tambours — extrait 1"></div>
<div class="audio-player" data-audio-key="song-01" data-title="Chant traditionnel — extrait 1"></div>
            </div>
          </section>

          <!-- Dance -->
          <section class="tabs__panel" role="tabpanel" id="panel-dance" aria-labelledby="tab-dance" hidden>
            <div class="two-col">
              <div>
                <h2 data-i18n="traditions.danceTitle">Danses</h2>
                <!-- VERIFY: names and contexts of the essani and ozila dances; regional variants exist. -->
                <p data-i18n="traditions.danceIntro"></p>
                <p data-i18n="traditions.danceText2"></p>
              </div>
              <figure>
                <img data-image-key="traditions-dance"
                     src="/assets/img/dance.jpg"
                     alt="" data-i18n-alt="traditions.danceAlt" loading="lazy"
                     style="border-radius:var(--radius-md)">
              </figure>
            </div>
          </section>

          <!-- Oral epics -->
          <section class="tabs__panel" role="tabpanel" id="panel-epics" aria-labelledby="tab-epics" hidden>
            <div class="two-col">
              <div>
                <h2 data-i18n="traditions.epicsTitle">Le Mvett, épopée des Ekang</h2>
                <p data-i18n="traditions.epicsP1"></p>
                <p data-i18n="traditions.epicsP2"></p>
              </div>
              <figure>
                <img data-image-key="traditions-epics"
                     src="/assets/img/stories.jpg"
                     alt="" data-i18n-alt="traditions.epicsAlt" loading="lazy"
                     style="border-radius:var(--radius-md)">
              </figure>
            </div>
            <div class="audio-player" data-audio-key="mvett-02" data-title="Récit de mvett — extrait" style="margin-top:var(--space-lg)"></div>
          </section>

          <!-- Beliefs -->
          <section class="tabs__panel" role="tabpanel" id="panel-beliefs" aria-labelledby="tab-beliefs" hidden>
            <div class="two-col">
              <div>
                <h2 data-i18n="traditions.beliefsTitle">Croyances &amp; spiritualité</h2>
                <p data-i18n="traditions.beliefsP1"></p>
                <p data-i18n="traditions.beliefsP2"></p>
              </div>
              <figure>
                <img data-image-key="traditions-beliefs"
                     src="/assets/img/life.jpg"
                     alt="" data-i18n-alt="traditions.beliefsAlt" loading="lazy"
                     style="border-radius:var(--radius-md)">
              </figure>
            </div>
          </section>

          <!-- Rites of passage -->
          <section class="tabs__panel" role="tabpanel" id="panel-rites" aria-labelledby="tab-rites" hidden>
            <div class="two-col">
              <div>
                <h2 data-i18n="traditions.ritesTitle">Rites de passage</h2>
                <p data-i18n="traditions.ritesBirth"></p>
                <!-- VERIFY: details of the historical Sso initiation rite. -->
                <p data-i18n="traditions.ritesInitiation"></p>
                <p data-i18n="traditions.ritesMarriage"></p>
                <p data-i18n="traditions.ritesFuneral"></p>
              </div>
              <figure>
                <img data-image-key="traditions-rites"
                     src="/assets/img/tradition-bridge.jpg"
                     alt="" data-i18n-alt="traditions.ritesAlt" loading="lazy"
                     style="border-radius:var(--radius-md)">
              </figure>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="footer"></footer>
